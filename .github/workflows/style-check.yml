name: Style Guide Checker

on:
  push:
    paths:
      - '**.md'
      - '.vale.ini'
      - '.github/styles/**'
  pull_request:
    paths:
      - '**.md'
      - '.vale.ini'
      - '.github/styles/**'

jobs:
  vale:
    name: Check writing style
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          files: docs/blog/posts
          fail_on_error: false
          version: 3.0.7
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      
      - name: Upload Vale results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vale-results
          path: vale-output.json
          retention-days: 14
